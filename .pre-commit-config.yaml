fail_fast: false
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check . --exclude .omo
        language: python
        additional_dependencies: ["ruff>=0.11.0"]
        pass_filenames: false
      - id: ruff-format-check
        name: ruff format --check
        entry: ruff format --check . --exclude .omo
        language: python
        additional_dependencies: ["ruff>=0.11.0"]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: mypy . --exclude .omo
        language: python
        additional_dependencies: ["mypy>=1.0", "types-PyYAML"]
        pass_filenames: false
      - id: bandit
        name: bandit
        entry: bandit -r .
        language: python
        additional_dependencies: ["bandit[toml]>=1.7"]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: bash -c 'python3 -m pytest tests/ -q 2>&1; if [ ${PIPESTATUS[0]} -ne 0 ]; then exit 1; fi'
        language: system
        pass_filenames: false
