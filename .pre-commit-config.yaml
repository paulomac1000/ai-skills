repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: python
        additional_dependencies: ["ruff>=0.11.0"]
        pass_filenames: false
      - id: ruff-format-check
        name: ruff format --check
        entry: ruff format --check .
        language: python
        additional_dependencies: ["ruff>=0.11.0"]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: mypy .
        language: python
        additional_dependencies: ["mypy>=1.0", "types-PyYAML"]
        pass_filenames: false
      - id: bandit
        name: bandit
        entry: bandit -r .
        language: python
        additional_dependencies: ["bandit[toml]>=1.7"]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: pytest -q
        language: python
        additional_dependencies: ["pytest>=8.0", "pyyaml"]
        pass_filenames: false
