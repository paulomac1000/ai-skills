# CI/CD Configuration Contract — Example with all v3.0.0 fields
#
# This file is the Single Source of Truth for all CI/CD parameters.
# Place it at: .github/ci-cd-config.yaml
#
# Workflow files (.github/workflows/*.yml) are GENERATED from this config
# using the templates in the ci-cd-architect skill.
# Do not manually edit workflow files after generation — update this file
# and regenerate.

# =============================================================================
# EXAMPLE 1: Python MCP Server (all v3.0.0 features)
# =============================================================================
# language: "python"
# src_dir: "tools/"
# package: "tools"
# project: "example-mcp"
# python_version: "3.14"
# image_name: "example-mcp:test"
# smoke_name: "example-mcp-smoke"
# health_port: 9091
# rest_port: 9099
# use_docker: true
# is_mcp: true
# expected_tools: 42
# use_codecov: true
# dockerfile_target: ""
# use_semgrep: true
# use_dependabot: true
# package_ecosystems: ["github-actions", "pip"]
# use_docs_validation: true
# docs_paths: ["docs/", "*.md"]
# docs_validation_script: "scripts/validate_docs.py"
# services: null

