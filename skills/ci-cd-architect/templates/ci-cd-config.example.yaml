# =============================================================================
# CONFIGURATION FIELDS REFERENCE (v3.0.0)
# =============================================================================
#
# REQUIRED FIELDS:
#
# language         (required)  Primary project language.
#                              Values: "python", "dotnet", "polyglot"
#                              Determines which CI template variant is used.
#
# src_dir          (required)  Source code directory for linting/scanning.
#                              Must end with "/".
#                              Examples: "src/my_package/", "tools/"
#
# package          (required)  Package/module name for --cov (Python) or
#                              assembly prefix (.NET).
#                              Examples: "my_package", "tools", "MyApp"
#
# project          (required)  Short project slug. Used for Docker tags and
#                              auto-tag bot name. Hyphenated, lowercase.
#                              Examples: "my-project", "example-mcp"
#
# ---
# PYTHON FIELDS:
#
# python_version   (optional)  Python version for setup-python. Default: "3.14"
#
# image_name       (optional)  Docker image name for local smoke testing.
#                              Default: "<project>:test"
#
# smoke_name       (optional)  Docker container name for smoke test.
#                              Default: "<project>-smoke"
#
# health_port      (optional)  Port for health endpoint verification.
#                              Required when use_docker=true.
#
# rest_port        (optional)  REST API port for MCP tool count verification.
#                              Required when is_mcp=true.
#
# use_docker       (optional)  Whether to run docker-smoke job. Default: true.
#                              When false, docker-smoke is replaced by a
#                              smoke job that runs pytest tests/smoke/ directly.
#
# is_mcp           (optional)  Whether the project is an MCP server.
#                              When true, includes tool count assertion.
#                              Default: false.
#
# expected_tools   (optional)  Exact number of MCP tools registered.
#                              Required when is_mcp=true.
#
# use_codecov      (optional)  Whether to upload coverage to Codecov.
#                              Requires CODECOV_TOKEN secret.
#                              Default: true for public repos.
#
# dockerfile_target (optional) Dockerfile build stage target.
#                              For multi-stage Dockerfiles.
#
# services         (optional)  External services for integration tests.
#                              Map of service name → {image, ports}.
#
# ---
# .NET FIELDS:
#
# dotnet_version   (optional)  .NET SDK version. Default: "8.0.x"
#                              Examples: "8.0.x", "9.0.x"
#
# dotnet_solution  (optional)  Path to .sln file. Required for dotnet CI.
#                              Example: "src/MyApp.sln"
#
# ---
# UNIVERSAL FIELDS (v3.0.0):
#
# use_semgrep      (optional)  Run Semgrep security scan on PR + push.
#                              Creates semgrep.yml + semgrep-scheduled.yml.
#                              Default: true.
#
# use_dependabot   (optional)  Generate .github/dependabot.yml.
#                              Default: true.
#
# package_ecosystems (optional) Package ecosystems for Dependabot.
#                              Default: ["github-actions", "pip"]
#                              Add "nuget" for .NET, "docker" for Docker,
#                              "gomod" for Go, "npm" for Node.js.
#
# use_docs_validation (optional) Validate documentation in CI.
#                              Creates docs-validation.yml.
#                              Default: false (auto-enabled when docs/ exists).
#
# docs_paths       (optional)  Paths to scan for documentation validation.
#                              Default: ["docs/", "*.md"]
#
# docs_validation_script (optional) Path to validation script.
#                              Example: "scripts/validate_docs.py"
#                              If empty, docs validation step is skipped.
